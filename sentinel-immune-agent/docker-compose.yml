version: "3.9"

# Securit-E Edge Agent — Docker Compose
# Usage:
#   docker-compose up -d
#   docker-compose logs -f sentinel-agent
#
# Production: use Helm chart (helm/) for Kubernetes deployment

services:
  securit-e-agent:
    build:
      context: .
      dockerfile: sentinel-immune-agent/Dockerfile
    image: securit-e/edge-agent:2026.1.0
    container_name: securit-e-agent
    restart: unless-stopped

    ports:
      - "8443:8443"  # mTLS API

    environment:
      - SENTINEL_TENANT_ID=${SENTINEL_TENANT_ID:-demo-tenant}
      - SENTINEL_REGION=${SENTINEL_REGION:-fr-paris}
      - SENTINEL_API_PORT=8443
      - SENTINEL_VAULT_URL=${SENTINEL_VAULT_URL:-https://vault.sentinel-immune.fr}
      - SENTINEL_SWARM_URL=${SENTINEL_SWARM_URL:-https://swarm.sentinel-immune.fr}
      - SENTINEL_WG_ENDPOINT=${SENTINEL_WG_ENDPOINT:-immune.sentinel-edge.fr:51820}
      # TLS certs — mount from host or K8s secret
      - SENTINEL_TLS_CERT=/certs/agent.crt
      - SENTINEL_TLS_KEY=/certs/agent.key
      - SENTINEL_CA_CERT=/certs/ca.crt
      # Post-quantum keys
      - SENTINEL_DILITHIUM_PUB=${SENTINEL_DILITHIUM_PUB:-}

    volumes:
      - ./certs:/certs:ro       # mTLS certificates
      - ./config.yaml:/config.yaml:ro  # Agent config

    networks:
      - sentinel-net

    # Resource limits (< 50MB RAM, minimal CPU)
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.2"
        reservations:
          memory: 32M

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      - "sentinel.immune.component=edge-agent"
      - "sentinel.immune.version=2026.1.0"
      - "sentinel.immune.pq=dilithium3"

networks:
  sentinel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
