version: "3.9"

# Securit-E Edge Agent — Docker Compose
# Usage:
#   docker-compose up -d
#   docker-compose logs -f securit-e-agent
#
# Production: use Helm chart (helm/) for Kubernetes deployment
# Development: set SENTINEL_DEV_MODE=true to disable security enforcement

services:
  securit-e-agent:
    build:
      context: .
      dockerfile: sentinel-immune-agent/Dockerfile
    image: securit-e/edge-agent:2026.1.0
    container_name: securit-e-agent
    restart: unless-stopped

    ports:
      - "8443:8443"  # mTLS API

    environment:
      - SENTINEL_TENANT_ID=${SENTINEL_TENANT_ID:?SENTINEL_TENANT_ID is required}
      - SENTINEL_REGION=${SENTINEL_REGION:-fr-paris}
      - SENTINEL_API_PORT=8443
      - SENTINEL_VAULT_URL=${SENTINEL_VAULT_URL:-https://vault.securit-e.com}
      - SENTINEL_SWARM_URL=${SENTINEL_SWARM_URL:-https://swarm.securit-e.com}
      - SENTINEL_WG_ENDPOINT=${SENTINEL_WG_ENDPOINT:-edge-agent.securit-e.com:51820}
      - SENTINEL_SIGNING_KEY=${SENTINEL_SIGNING_KEY:?SENTINEL_SIGNING_KEY is required}
      # TLS certs — mount from host or K8s secret
      - SENTINEL_TLS_CERT=/certs/agent.crt
      - SENTINEL_TLS_KEY=/certs/agent.key
      - SENTINEL_CA_CERT=/certs/ca.crt
      # Dev mode — set to "true" only for local development
      # - SENTINEL_DEV_MODE=true

    volumes:
      - ./certs:/certs:ro       # mTLS certificates
      - ./config.yaml:/config.yaml:ro  # Agent config

    networks:
      - securit-e-net

    # Resource limits (< 50MB RAM, minimal CPU)
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.2"
        reservations:
          memory: 32M

    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://localhost:8443/health", "--no-check-certificate"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      - "securit-e.component=edge-agent"
      - "securit-e.version=2026.1.0"
      - "securit-e.signing=sha256-hmac"

networks:
  securit-e-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
